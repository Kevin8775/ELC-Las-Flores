services:
  - type: web
    name: elc-las-flores-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elc-las-flores-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://elc-las-flores.netlify.app
      - key: EMAIL_FROM
        value: ELC Las Flores <onboarding@resend.dev>

databases:
  - name: elc-las-flores-db
    region: oregon
    plan: free
    databaseName: elc_las_flores
